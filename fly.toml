# fly.toml app configuration file generated for cafecito-medicafe on 2026-07-12T12:26:59-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cafecito-medicafe'
primary_region = 'iad'

[build]
[[mounts]]
  source = 'medicafe_casesdb'
  destination = '/data'
  initial_size = "10gb"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit = "50GB"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'
