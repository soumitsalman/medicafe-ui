services:
  api:
    build: ./api
    container_name: medicafe-api
    ports:
      - "8000:8080"
    volumes:
      - medicafe-cases:/data
    environment:
      CASES_DB_PATH: /data
      API_KEY: ${NUXT_PUBLIC_API_KEY:-}
    networks:
      - medicafe

  app:
    build: ./app
    container_name: medicafe-app
    ports:
      - "3000:8080"
    environment:
      # Runtime only (Nuxt maps NUXT_PUBLIC_* → runtimeConfig.public). Never build-time.
      # Browser reaches the API via the published host port.
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
      NUXT_PUBLIC_API_KEY: ${NUXT_PUBLIC_API_KEY:-}
    depends_on:
      - api
    networks:
      - medicafe

networks:
  medicafe:
    driver: bridge

volumes:
  medicafe-cases:
